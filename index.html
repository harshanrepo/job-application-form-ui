<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="index.css">
    <link rel="shortcut icon" href="assests/favicon.png" type="image/png">
</head>

<body>

    <div class="container">
        <form>
            <h1>Job Application Form</h1>

            <section>
                <label for="name">Full Name:</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </section>

            <section>
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </section>

            <section>
                <label for="position">Position:</label>
                <select id="position" required>
                    <option value="">Select a position</option>
                    <option>Developer</option>
                    <option>Designer</option>
                    <option>Manager</option>
                </select>
            </section>

            <fieldset class="available-time">
                <legend>Availability</legend>

                <div class="radio-group">
                    <label>
                        <input type="radio" name="availability" value="full-time">
                        Full-Time
                    </label>

                    <label>
                        <input type="radio" name="availability" value="part-time" checked>
                        Part-Time
                    </label>
                </div>
            </fieldset>

            <section>
                <label for="message">Why do you want this job?</label>
                <textarea id="message" rows="4" placeholder="Write your motivation" required></textarea>
            </section>

            <button type="submit">Submit Application</button>

        </form>
    </div>

</body>

</html>
